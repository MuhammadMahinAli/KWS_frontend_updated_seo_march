<!DOCTYPE html>
<html lang="en">
  <head>

    <!-- Favicon -->

    <!-- Canonical URL (will be overridden per route by react-helmet-async) -->
    <link rel="canonical" href="https://kws.technology/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kws.technology/" />

    <!-- Twitter Card -->

    <meta name="twitter:url" content="https://kws.technology/" />

    <meta name="twitter:description" content="We build production-ready AI agents, automations, and web apps—lead gen, booking, CRM workflows, support, and more." />
    <meta name="twitter:image" content="https://kws.technology/og-default.png" />
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload critical font -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" as="style" />
    
    <!-- Google Fonts with font-display: swap -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet" />
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#f7f5ef" />
    
    <!-- DNS prefetch for any external APIs -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  </head>
